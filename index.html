<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ben 10: 20 Aliens Ultimate Omnitrix Battle V6</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #051f05, #000000);
            color: #00ff00;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }
        h1 {
            font-size: 22px;
            text-shadow: 0 0 10px #00ff00;
            margin: 0 0 5px 0;
            letter-spacing: 1px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 12px;
            font-size: 12px;
        }

        /* โซนสนามรบ บอส VS ตัวเรา */
        .battle-arena {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 520px;
            margin-bottom: 12px;
        }
        .unit-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 12px;
            border-radius: 12px;
            box-sizing: border-box;
        }
        .boss-side {
            border: 2px solid #ff3333;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.1);
        }
        .player-side {
            border: 2px solid #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.1);
        }
        .unit-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 3px;
        }
        .boss-side .unit-name { color: #ff3333; text-shadow: 0 0 8px rgba(255,51,51,0.4); }
        .player-side .unit-name { color: #00ff00; text-shadow: 0 0 8px rgba(0,255,0,0.4); }
        
        /* แถบเลือด HP */
        .hp-container {
            width: 100%;
            background-color: #222;
            border-radius: 8px;
            height: 16px;
            overflow: hidden;
            margin: 5px 0;
        }
        .boss-side .hp-container { border: 1px solid #ff3333; }
        .player-side .hp-container { border: 1px solid #00ff00; }
        
        .hp-bar {
            width: 100%;
            height: 100%;
            transition: width 0.3s ease;
        }
        .boss-side .hp-bar { background: linear-gradient(90deg, #ff3333, #ff7777); }
        .player-side .hp-bar { background: linear-gradient(90deg, #00aa00, #00ff00); }

        /* บันทึกการต่อสู้ */
        .log-box {
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            font-size: 13px;
            color: #fff;
            text-align: center;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-style: italic;
        }
        
        /* โซนแผงควบคุมการเลือกเอเลี่ยน 20 ตัว */
        .selection-title {
            font-size: 13px;
            color: #88ff88;
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        .alien-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            width: 100%;
            max-width: 520px;
            background: rgba(0, 255, 0, 0.02);
            border: 1px solid #004400;
            padding: 6px;
            border-radius: 10px;
            margin-bottom: 12px;
            box-sizing: border-box;
        }
        .alien-item {
            background: #111;
            border: 1px solid #222;
            color: #777;
            padding: 8px 4px;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            font-size: 11px;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .alien-item:hover { border-color: #00ff00; color: #00ff00; background: #151515; }
        .alien-item.selected {
            background: #004d00;
            border-color: #00ff00;
            color: #fff;
            box-shadow: 0 0 8px rgba(0, 255, 0, 0.5);
            font-weight: bold;
        }

        /* ตัวนาฬิกา Omnitrix */
        .omnitrix-dial {
            width: 110px;
            height: 110px;
            background: #151515;
            border: 5px solid #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.9);
            cursor: pointer;
        }
        .core {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #003300, #001100);
            border-radius: 50%;
            border: 3px solid #00ff00;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px #00ff00;
            font-size: 32px;
            transition: all 0.3s;
        }
        
        .scanning {
            animation: flash 0.12s infinite alternate;
            border-color: #ffaa00 !important;
            box-shadow: 0 0 15px #ffaa00 !important;
        }
        .timeout {
            animation: flash-red 0.3s infinite alternate;
            border-color: #ff0000 !important;
            box-shadow: 0 0 20px #ff0000 !important;
        }
        @keyframes flash { from { background: #001100; } to { background: #ffaa00; } }
        @keyframes flash-red { from { background: #000; } to { background: #550000; } }

        /* ปุ่มกดควบคุม */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .omni-btn {
            padding: 10px 18px;
            background-color: #00ff00;
            color: black;
            border: none;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }
        .omni-btn:hover { background-color: #fff; transform: scale(1.02); }
        .btn-attack { background-color: #ff3333; color: white; display: none; }
        .btn-attack:hover { background-color: #ff7777; color: black; }
        .btn-secondary { background-color: #222; color: #00ff00; border: 1px solid #00ff00; }
    </style>
</head>
<body>

    <h1>⚔️ OMNITRIX BATTLE ROSTER V6</h1>
    <div class="subtitle">Devops-02: มหาสงครามปลดล็อกกองทัพเอเลี่ยน 20 ตัว</div>

    <div class="battle-arena">
        <div class="unit-box boss-side">
            <div class="unit-name" id="boss-name-display">🐙 Vilgax</div>
            <div style="font-size: 11px;">HP: <span id="boss-hp-text">100</span> / <span id="boss-max-hp-text">100</span></div>
            <div class="hp-container"><div class="hp-bar" id="bossHpBar"></div></div>
        </div>

        <div class="unit-box player-side">
            <div class="unit-name" id="player-name-display">🟢 Ben Tennyson (ร่างมนุษย์)</div>
            <div style="font-size: 11px;">HP: <span id="player-hp-text">100</span> / 100</div>
            <div class="hp-container"><div class="hp-bar" id="playerHpBar"></div></div>
        </div>

        <div class="log-box" id="battle-log">เลือกเอเลี่ยนจากคลัง 20 ตัวด้านล่าง หรือกด "🌌 สุ่มค้นหา DNA" เพื่อลุย!</div>
    </div>

    <div class="selection-title">🧬 คลังข้อมููล DNA (ปลดล็อกเอเลี่ยนครบ 20 ตัวแล้ว):</div>
    <div class="alien-grid" id="alienGrid"></div>

    <div class="omnitrix-dial" onclick="activateTransformation()">
        <div class="core" id="omni-core">🟢</div>
    </div>

    <div class="btn-group">
        <button class="omni-btn" id="btn-transform" onclick="activateTransformation()">ตบหน้าปัดเพื่อแปลงร่าง! ⚡</button>
        <button class="omni-btn btn-attack" id="btn-attack" onclick="playerTurn()">💥 สั่งโจมตีบอส!</button>
        <button class="omni-btn btn-secondary" id="btn-random" onclick="triggerRandom()">🌌 สุ่มค้นหา DNA</button>
        <button class="omni-btn btn-secondary" id="btn-reset" onclick="resetGame()" style="display:none; background-color:#ff3333; color:white;">REBOOT OMNITRIX</button>
    </div>

    <script>
        // รายชื่อเอเลี่ยนอัปเกรดจัดเต็มครบ 20 ตัวละคร
        const alienList = [
            { name: "🔥 Heatblast", icon: "🔥", dmg: 22, move: "พ่นลาวาร้อนแรงแผดเผาใส่บอส!" },
            { name: "💪 Four Arms", icon: "💪", dmg: 28, move: "รัวหมัดจอมพลังสี่แขนทุบหน้าบอส!" },
            { name: "⚡ XLR8", icon: "⚡", dmg: 16, move: "วิ่งด้วยความเร็วแสงแล้วโดดเตะสับคอมโบ!" },
            { name: "💎 Diamondhead", icon: "💎", dmg: 20, move: "เสกดาบผลึกคริสตัลเพชรพุ่งแทงทะลวง!" },
            { name: "🦾 Upgrade", icon: "🦾", dmg: 24, move: "ยิงลำแสงเลเซอร์พลาสมาอัดใส่บอส!" },
            { name: "🤢 Stinkfly", icon: "🤢", dmg: 14, move: "พ่นน้ำเมือกเหนียวหนึบใส่หน้าบอส!" },
            { name: "🧠 Grey Matter", icon: "🧠", dmg: 10, move: "วิเคราะห์จุดอ่อนแล้วช็อตวงจรไฟฟ้าบอส!" },
            { name: "🐺 Wildmutt", icon: "🐺", dmg: 18, move: "กระโจนเข้าขย้ำอย่างดุร้ายด้วยสัญชาตญาณสัตว์ป่า!" },
            { name: "🦈 Ripjaws", icon: "🦈", dmg: 19, move: "ใช้กรามฉลามยักษ์งับและกระชากร่างบอส!" },
            { name: "👻 Ghostfreak", icon: "👻", dmg: 17, move: "ล่องหนไปโผล่ด้านหลังแล้วปล่อยพลังจิตหลอนดึงพลังชีวิต!" },
            { name: "cannonbolt", icon: "⚽", dmg: 25, move: "ม้วนตัวเป็นลูกบอลเกราะเหล็กพุ่งชนกระแทกบอสปลิว!" },
            { name: "Wildvine", icon: "🌿", dmg: 15, move: "ยืดเถาวัลย์หนามพันธนาการรัดร่างและระเบิดเมล็ดพันธุ์ใส่!" },
            { name: "Swampfire", icon: "🌳", dmg: 24, move: "พ่นแก๊สชีวภาพพร้อมจุดไฟระเบิดบอสตูมใหญ่!" },
            { name: "Humungousaur", icon: "🦖", dmg: 32, move: "ขยายร่างยักษ์แล้วใช้หางหนามทุบศัตรูแหลกละเอียด!" },
            { name: "Big Chill", icon: "🦋", dmg: 21, move: "บินทะลุร่างบอสพร้อมปล่อยไอเย็นเยือกแข็งจนแช่แข็ง!" },
            { name: "Jetray", icon: "✈️", dmg: 20, move: "บินความเร็วเหนือแสงยิงลำแสงคานเนโร่จากตาและหาง!" },
            { name: "Chromastone", icon: "🔮", dmg: 23, move: "ดูดซับพลังงานรอบตัวแล้วยิงสวนเป็นลำแสงสีรุ้งทำลายล้าง!" },
            { name: "Brainstorm", icon: "🦀", dmg: 22, move: "เปิดกระดองหัวระเบิดพลังงานไฟฟ้าสมองกลกระแทกบอส!" },
            { name: "Echo Echo", icon: "🔊", dmg: 18, move: "แยกร่างโคลนล้อมรอบบอสแล้วประสานเสียงคลื่นโซนิคถล่มหู!" },
            { name: "Alien X", icon: "🌌", dmg: 45, move: "ใช้พลังแห่งพระเจ้าคุมมิติ ตัดแปลงความเป็นจริงลบพลังบอสหายไปครึ่งตัว!" }
        ];

        const bossList = [
            { name: "🐙 Vilgax (วิลแกกซ์)", maxHp: 120, atk: 15, move: "ใช้ดาบยักษ์ฟันสวนกลับใส่คุณ!" },
            { name: "⚡ Kevin 11 (เควิน 11)", maxHp: 140, atk: 18, move: "ใช้หมัดกลายพันธุ์ชกกระแทกคุณเต็มแรง!" },
            { name: "🧠 Dr. Animo (ดร.แอนิโม)", maxHp: 100, atk: 12, move: "สั่งสัตว์อสูรกลายพันธุ์ยักษ์พุ่งเข้ามาขย้ำ!" },
            { name: "👹 Aggregor (แอกเกรเกอร์)", maxHp: 160, atk: 22, move: "ยิงพลังงานธาตุผสมผสานระเบิดใส่คุณ!" }
        ];

        let currentBossIndex = 0;
        let bossHp = bossList[0].maxHp;
        let playerHp = 100;
        let selectedAlienIndex = null;
        let isScanning = false;
        let hasTransformed = false;
        let isGameOver = false;

        function initGame() {
            const grid = document.getElementById('alienGrid');
            grid.innerHTML = '';
            alienList.forEach((alien, index) => {
                const item = document.createElement('div');
                item.classList.add('alien-item');
                item.id = `alien-${index}`;
                // เอาเฉพาะตัวหน้ามาโชว์ถ้าชื่อยาวไป
                item.innerText = `${alien.icon} ${alien.name}`;
                item.title = alien.name;
                item.onclick = () => selectAlien(index);
                grid.appendChild(item);
            });
            updateUI();
        }

        function selectAlien(index) {
            if (isScanning || isGameOver) return;
            if (selectedAlienIndex !== null) document.getElementById(`alien-${selectedAlienIndex}`).classList.remove('selected');
            
            selectedAlienIndex = index;
            document.getElementById(`alien-${index}`).classList.add('selected');
            document.getElementById('omni-core').innerText = alienList[index].icon;
            
            hasTransformed = false;
            document.getElementById('btn-attack').style.display = 'none';
            document.getElementById('btn-transform').style.display = 'inline-block';
            document.getElementById('battle-log').innerText = `ระบบเลือก DNA: ${alienList[index].name} เรียบร้อย ตบหน้าปัดนาฬิกาเพื่อแปลงร่าง!`;
        }

        function triggerRandom() {
            if (isScanning || isGameOver) return;
            const randomIndex = Math.floor(Math.random() * alienList.length);
            selectAlien(randomIndex);
            activateTransformation();
        }

        function activateTransformation() {
            if (isScanning || isGameOver) return;
            if (selectedAlienIndex === null) { alert("❌ กรุณาเลือกเอเลี่ยนจากตาราง หรือกดปุ่มสุ่มก่อนครับ!"); return; }

            isScanning = true;
            const core = document.getElementById('omni-core');
            core.classList.add('scanning');
            document.getElementById('battle-log').innerText = "⚡ สัญญาณสตรีมมิ่ง DNA 100%... โครงสร้างโมเลกุลกำลังเปลี่ยนรูป...";

            setTimeout(() => {
                core.classList.remove('scanning');
                const alien = alienList[selectedAlienIndex];
                core.innerText = alien.icon;
                
                document.getElementById('player-name-display').innerText = `🟢 Ben (${alien.name})`;
                document.getElementById('battle-log').innerText = `⚡ แปลงร่างเป็น ${alien.name} เรียบร้อย! เข้าสู้ในสถานะพร้อมรบ!`;
                
                isScanning = false;
                hasTransformed = true;
                document.getElementById('btn-attack').style.display = 'inline-block';
                document.getElementById('btn-transform').style.display = 'none';
            }, 1000);
        }

        function playerTurn() {
            if (!hasTransformed || isGameOver || isScanning) return;
            
            const alien = alienList[selectedAlienIndex];
            bossHp -= alien.dmg;
            if (bossHp < 0) bossHp = 0;
            updateUI();

            document.getElementById('battle-log').innerText = `⚔️ ${alien.name} ใช้ท่า [${alien.move}] สร้างดาเมจอย่างหนัก ${alien.dmg} หน่วย!`;

            if (bossHp <= 0) {
                document.getElementById('battle-log').innerText = `🎉 สุดยอด! คุณโค่นล้มบอสตัวร้าย ${bossList[currentBossIndex].name} สำเร็จ!`;
                disableActions();
                setTimeout(nextBoss, 1500);
            } else {
                isScanning = true;
                setTimeout(bossTurn, 800);
            }
        }

        function bossTurn() {
            if (isGameOver || bossHp <= 0) return;

            const boss = bossList[currentBossIndex];
            playerHp -= boss.atk;
            if (playerHp < 0) playerHp = 0;
            updateUI();

            document.getElementById('battle-log').innerText += ` \n🚨 บอสโจมตีสวน! ${boss.name} ใช้ [${boss.move}] ซัดคุณเข้าเต็มเปา ลดไป ${boss.atk} HP!`;
            isScanning = false;

            if (playerHp <= 0) {
                document.getElementById('battle-log').innerText = "💀 โดนดาเมจสะสมจนน็อก! พลังงานหมดลงแล้ว หน้าปัด Omnitrix ปิดระบบความปลอดภัย!";
                document.getElementById('omni-core').innerText = "❌";
                document.getElementById('omni-core').classList.add('timeout');
                endGame();
            }
        }

        function updateUI() {
            const boss = bossList[currentBossIndex];
            document.getElementById('boss-name-display').innerText = boss.name;
            document.getElementById('boss-hp-text').innerText = bossHp;
            document.getElementById('boss-max-hp-text').innerText = boss.maxHp;
            document.getElementById('bossHpBar').style.width = `${(bossHp / boss.maxHp) * 100}%`;

            document.getElementById('player-hp-text').innerText = playerHp;
            document.getElementById('playerHpBar').style.width = `${playerHp}%`;
        }

        function nextBoss() {
            currentBossIndex = (currentBossIndex + 1) % bossList.length;
            bossHp = bossList[currentBossIndex].maxHp;
            playerHp = 100; // คืนเลือดเมื่อผ่านด่าน
            
            document.getElementById('battle-log').innerText = `🚨 ตื่นตัวขึ้น! ศัตรูคนถัดไป [${bossList[currentBossIndex].name}] บุกเข้ามาท้าทายแล้ว!`;
            document.getElementById('player-name-display').innerText = `🟢 Ben Tennyson (ร่างมนุษย์)`;
            document.getElementById('omni-core').innerText = "🟢";
            
            hasTransformed = false;
            isScanning = false;
            if (selectedAlienIndex !== null) document.getElementById(`alien-${selectedAlienIndex}`).classList.remove('selected');
            selectedAlienIndex = null;

            document.getElementById('btn-transform').style.display = 'inline-block';
            document.getElementById('btn-attack').style.display = 'none';
            updateUI();
        }

        function disableActions() {
            document.getElementById('btn-attack').style.display = 'none';
            document.getElementById('btn-transform').style.display = 'none';
            document.getElementById('btn-random').style.display = 'none';
        }

        function endGame() {
            isGameOver = true;
            disableActions();
            document.getElementById('btn-reset').style.display = 'inline-block';
        }

        function resetGame() {
            currentBossIndex = 0;
            bossHp = bossList[0].maxHp;
            playerHp = 100;
            selectedAlienIndex = null;
            isScanning = false;
            hasTransformed = false;
            isGameOver = false;
            
            document.getElementById('omni-core').classList.remove('timeout');
            document.getElementById('omni-core').innerText = "🟢";
            document.getElementById('player-name-display').innerText = `🟢 Ben Tennyson (ร่างมนุษย์)`;
            document.getElementById('btn-reset').style.display = 'none';
            document.getElementById('btn-transform').style.display = 'inline-block';
            document.getElementById('btn-random').style.display = 'inline-block';
            
            initGame();
        }

        initGame();
    </script>

</body>
</html>
