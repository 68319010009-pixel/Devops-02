<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devops-02: Calculator</title>
    <style>
        body {
            font-family: sans-serif;
            background: #a29bfe;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        input {
            width: 80%;
            padding: 10px
            margin: 10px 0;
            text-align: center;
        }
        button {
            width: 85%;
            padding: 10px;
            background: #6c5ce7;
            color: white;
            border: none;
            cursor: pointer;
        }
        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>🚀 เครื่องคิดเลข Devops-02</h2>
        <input type="number" id="n1" placeholder="ตัวเลขที่ 1">
        <input type="number" id="n2" placeholder="ตัวเลขที่ 2">
        <button onclick="cal()">คำนวณผลรวม</button>
        <div id="result">ผลลัพธ์จะแสดงตรงนี้</div>
    </div>
    <script>
        function cal() {
            var num1 = parseFloat(document.getElementById('n1').value);
            var num2 = parseFloat(document.getElementById('n2').value);
            if (isNaN(num1) || isNaN(num2)) {
                document.getElementById('result').innerText = "❌ กรุณาใส่ตัวเลขให้ครบ";
                return;
            }
            document.getElementById('result').innerText = "🎉 ผลรวมคือ: " + (num1 + num2);
        }
    </script>
</body>
</html>
